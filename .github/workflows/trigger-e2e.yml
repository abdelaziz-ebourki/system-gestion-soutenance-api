name: Trigger E2E Tests

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key for e2e repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.E2E_SSH_KEY }}

      - name: Push trigger to e2e repo
        run: |
          git clone git@github.com:abdelaziz-ebourki/system-gestion-soutenance-e2e.git e2e
          cd e2e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p triggers
          cat > triggers/api-update.json << EOF
          {
            "repo": "system-gestion-soutenance-api",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}"
          }
          EOF

          git add triggers/api-update.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "trigger: api-update ${{ github.sha }}"
            git push origin main
          fi
